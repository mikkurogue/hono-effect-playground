services:
  postgres:
    image: postgres:17
    container_name: hono-api-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hono_api
      POSTGRES_PASSWORD: hono_api_password
      POSTGRES_DB: hono_api
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hono_api"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: hono-api-postgres-db
